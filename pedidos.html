<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos</title>
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
    <h1 class="text-center">¡Bienvenidos!</h1>
    <form class="row g-3 needs-validation" novalidate>
        <div class="col-md-4">
            <label for="validationCustom01" class="form-label">Nombre</label>
            <input type="text" class="form-control w-20" id="validationCustom01" required>
            <div class="valid-feedback">
                Vas bien!
            </div>
        </div>
        <div class="col-md-4">
            <label for="validationCustom02" class="form-label">Apellido</label>
            <input type="text" class="form-control w-20" id="validationCustom02" required>
            <div class="valid-feedback">
                Sigue ya casii!
            </div>
        </div>
        <div class="col-md-4">
            <label for="validationCustomUsername" class="form-label">Orden</label>
            <div class="input-group has-validation">

                <input type="text" class="form-control w-70" id="validationCustomUsername"
                    aria-describedby="inputGroupPrepend" required>

                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox"  id="invalidCheck" required>
                        <label class="form-check-label" for="invalidCheck">
                            Estas de acuerdo con los terminos
                        </label>
                    </div>
                </div>
                <div class="col-12" >
                    <button class="btn btn-primary" type="submit">Submit form</button>
                </div>
    </form>
   
        
</body>

</html>
